# CI pipeline: runs on every push and PR.
# Gates a merge on lint, type-check, tests, and a production build for both apps.
# Jobs run in parallel; each is independent so a frontend failure still surfaces
# backend results (and vice versa).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint · type · test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkly
          POSTGRES_PASSWORD: test
          POSTGRES_DB: linkly_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U linkly"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://linkly:test@localhost:5432/linkly_test
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy app
      - name: Test (pytest)
        run: pytest -q

  frontend:
    name: Frontend (lint · type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Type-check (tsc)
        run: npm run typecheck
      - name: Test (vitest)
        run: npm test
      - name: Build (next build)
        run: npm run build
